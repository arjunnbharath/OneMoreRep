name: onemorerep
description: OneMoreRep fitness app for Android and Windows.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.3
  provider: ^6.1.2
  go_router: ^14.6.2
  video_player: ^2.9.2
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/workout-videos-manifest.json
    - assets/workouts.json
